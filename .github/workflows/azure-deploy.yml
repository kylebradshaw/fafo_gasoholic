name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_CONTAINER_APP: gasoholic
  AZURE_RESOURCE_GROUP: gasoholic-rg
  ACR_NAME: gasoholicacr
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (verify)
        run: dotnet build gasoholic.csproj -c Release

      # Required secret: AZURE_CREDENTIALS
      # How to create it:
      #   az ad sp create-for-rbac \
      #     --name gasoholic-deployer \
      #     --role contributor \
      #     --scopes /subscriptions/<sub-id>/resourceGroups/gasoholic-rg \
      #     --json-auth
      # Paste the entire JSON output as the AZURE_CREDENTIALS secret.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Build and deploy ───────────────────────────────────────────────────
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }}

      # ── Post-deploy: reconcile and verify ──────────────────────────────────
      - name: Reconcile Container App template
        run: |
          az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o yaml > /tmp/current-app.yaml

          python3 -c "
          import yaml, sys
          with open('/tmp/current-app.yaml') as f:
              data = yaml.safe_load(f)
          tpl = data.get('properties', {}).get('template', {})
          dirty = False
          if tpl.get('volumes'):
              tpl['volumes'] = []
              dirty = True
          for c in tpl.get('containers', []):
              if c.get('volumeMounts'):
                  del c['volumeMounts']
                  dirty = True
          if dirty:
              with open('/tmp/clean-app.yaml', 'w') as f:
                  yaml.dump(data, f, default_flow_style=False)
              sys.exit(0)
          else:
              sys.exit(2)
          " && {
            echo "Removing stale volumes and volume mounts..."
            az containerapp update \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --yaml /tmp/clean-app.yaml
          } || {
            RC=$?
            if [ "$RC" -eq 2 ]; then
              echo "No volumes found — template is already clean."
            else
              exit "$RC"
            fi
          }

      - name: Verify Cosmos wiring
        run: |
          COSMOS_ENV=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='ConnectionStrings__Cosmos'].{name:name, secretRef:secretRef}" -o json)

          echo "Cosmos env binding: $COSMOS_ENV"

          if echo "$COSMOS_ENV" | grep -q "cosmos-connection"; then
            echo "✓ ConnectionStrings__Cosmos is bound to cosmos-connection secret."
          else
            echo "✗ FATAL: ConnectionStrings__Cosmos is missing or not bound to cosmos-connection!"
            exit 1
          fi

      - name: Tag legacy storage account
        run: |
          az storage account update \
            --name gasoholicdata \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --tags legacy=true status=unused-post-cosmos-pivot

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Smoke test
        working-directory: e2e
        env:
          BASE_URL: https://gasoholic.yellowcliff-a9ca470c.eastus.azurecontainerapps.io
          SMOKE_TEST_SECRET: ${{ secrets.SMOKE_TEST_SECRET }}
        run: |
          # Wait for new revision to be healthy (up to 3 min)
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/health" || echo 0)
            [ "$STATUS" = "200" ] && break
            echo "Waiting for container to start ($i/18)..."
            sleep 10
          done
          npm run test:smoke

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: e2e/playwright-report/
          retention-days: 7
