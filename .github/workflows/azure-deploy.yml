name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_CONTAINER_APP: gasoholic
  AZURE_RESOURCE_GROUP: gasoholic-rg
  ACR_NAME: gasoholicacr

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (verify)
        run: dotnet build -c Release

      # Required secret: AZURE_CREDENTIALS
      # How to create it:
      #   az ad sp create-for-rbac \
      #     --name gasoholic-deployer \
      #     --role contributor \
      #     --scopes /subscriptions/<sub-id>/resourceGroups/gasoholic-rg \
      #     --json-auth
      # Paste the entire JSON output as the AZURE_CREDENTIALS secret.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.AZURE_CONTAINER_APP }}:${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci

      - name: Smoke test
        working-directory: e2e
        env:
          BASE_URL: https://gasoholic.yellowcliff-a9ca470c.eastus.azurecontainerapps.io
          SMOKE_TEST_SECRET: ${{ secrets.SMOKE_TEST_SECRET }}
        run: |
          # Wait for new revision to be healthy (up to 3 min)
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/health" || echo 0)
            [ "$STATUS" = "200" ] && break
            echo "Waiting for container to start ($i/18)..."
            sleep 10
          done
          npm run test:smoke

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: e2e/playwright-report/
          retention-days: 7
