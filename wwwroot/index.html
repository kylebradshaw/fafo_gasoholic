<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gasoholic — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #111;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.375rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus {
      border-color: #2563eb;
    }

    button[type="submit"] {
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: default; }

    .error {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #dc2626;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gasoholic</h1>
    <p class="subtitle">Enter your email to sign in or create an account.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      <button type="submit" id="submitBtn">Sign In</button>
      <p class="error" id="error"></p>
    </form>
  </div>

  <script>
    // If already logged in, skip to app
    (async () => {
      try {
        const res = await fetch('/auth/me', { credentials: 'same-origin' });
        if (res.ok) window.location.replace('/app.html');
      } catch (_) {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          window.location.replace('/app.html');
        } else {
          errEl.textContent = 'Sign in failed. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (_) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
