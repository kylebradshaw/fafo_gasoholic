<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gasoholic — Welcome!</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f06c14">
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Gasoholic">
  <link rel="apple-touch-icon" href="assets/icons/icon512_rounded.png">

  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
    width: 100dvw;
    min-height: 100dvh;
    overflow-x: hidden; /* prevents horizontal scroll from dvw on some browsers */
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-family: 'Contrail One', system-ui, sans-serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
      color: #111;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.375rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus { border-color: #2563eb; }

    button[type="submit"] {
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: default; }

    .error {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #dc2626;
      display: none;
    }

    /* Verification pending state */
    #pendingState { display: none; }

    .pending-icon {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .pending-email {
      font-weight: 600;
      color: #111;
    }

    .pending-msg {
      font-size: 0.9rem;
      color: #555;
      margin: 0.75rem 0 1.25rem;
      line-height: 1.5;
    }

    .btn-secondary {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      color: #2563eb;
      border: 1px solid #2563eb;
      border-radius: 5px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-secondary:hover { background: #eff6ff; }
    .btn-secondary:disabled { opacity: 0.5; cursor: default; }

    .back-link {
      display: block;
      margin-top: 0.75rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      cursor: pointer;
      text-decoration: underline;
    }

    .cooldown-msg {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #6b7280;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
    <br>
    <br>
    <br>
    <img width="800" src="images/restored-alpha.png" />
    <br>
    <br>
  <div class="card">
    <h1>GASOHOLIC</h1>

    <!-- Login form -->
    <div id="loginState">
      <p class="subtitle">Enter your email to sign in or create an account.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
        <button type="submit" id="submitBtn">Sign In</button>
        <p class="error" id="error"></p>
      </form>
    </div>

    <!-- Verification pending state -->
    <div id="pendingState">
      <div class="pending-icon">✉️</div>
      <p class="subtitle">Check your inbox</p>
      <p class="pending-msg">
        We sent a sign-in link to <span class="pending-email" id="pendingEmail"></span>.
        Click the link in the email to continue — it expires in 24 hours.
      </p>
      <button class="btn-secondary" id="resendBtn">Resend link</button>
      <p class="cooldown-msg" id="cooldownMsg"></p>
      <span class="back-link" id="backLink">Use a different email</span>
    </div>
  </div>

  <script>
    // If already logged in, skip to app (non-blocking — form renders immediately)
    fetch('/auth/me', { credentials: 'same-origin' })
      .then(res => { if (res.ok) window.location.replace('/app.html'); })
      .catch(() => {});

    let pendingEmail = '';

    function showPending(email) {
      pendingEmail = email;
      document.getElementById('pendingEmail').textContent = email;
      document.getElementById('loginState').style.display = 'none';
      document.getElementById('pendingState').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('loginState').style.display = 'block';
      document.getElementById('pendingState').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'Sign In';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = 'Sending...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok && data.status === 'ok') {
          window.location.replace('/app.html');
        } else if ((res.status === 202 || res.ok) && data.status === 'pending') {
          showPending(email);
        } else {
          errEl.textContent = 'Sign in failed. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (_) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    document.getElementById('resendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('resendBtn');
      const msg = document.getElementById('cooldownMsg');
      btn.disabled = true;
      msg.style.display = 'none';

      try {
        const res = await fetch('/auth/resend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email: pendingEmail })
        });

        if (res.status === 429) {
          msg.textContent = 'Too many attempts. Please wait an hour before requesting another link.';
          msg.style.display = 'block';
        } else {
          msg.textContent = 'Link sent! Check your inbox (or spam folder).';
          msg.style.display = 'block';
        }
      } catch (_) {
        msg.textContent = 'Network error. Please try again.';
        msg.style.display = 'block';
      }

      // Re-enable after 30 seconds
      setTimeout(() => { btn.disabled = false; }, 30000);
    });

    document.getElementById('backLink').addEventListener('click', showLogin);

    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
  </script>
</body>
</html>
